# Prometheus Configuration for MemeGPT
# Monitors application metrics and performance

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'memegpt-monitor'
    environment: '${ENVIRONMENT:-staging}'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI Backend
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8000']
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']

# Alert rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']
