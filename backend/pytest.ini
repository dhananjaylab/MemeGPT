[pytest]
# ── Async ────────────────────────────────────────────────────────────────────
# pytest-asyncio 0.21+ requires an explicit mode setting; "auto" means every
# async test function is wrapped automatically — no per-test decorator needed.
asyncio_mode = auto

# ── Discovery ────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ──────────────────────────────────────────────────────────────────
markers =
    unit: pure-Python logic with no I/O
    integration: requires a running Postgres + Redis (skipped in CI unless --integration passed)
    slow: takes more than 2 seconds (skipped unless --slow passed)

# ── Output ───────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
